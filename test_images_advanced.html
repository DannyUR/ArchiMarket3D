<!DOCTYPE html>
<html>
<head>
    <title>Direct Image Test - Exact React Setup</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f8f9fa; }
        .container { max-width: 600px; margin: 0 auto; }
        .test-card { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .img-wrapper { 
            width: 300px; 
            height: 300px; 
            background: linear-gradient(145deg, #6C63FF10 0%, #6C63FF05 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin: 10px 0;
        }
        img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            display: block;
        }
        .icon { 
            font-size: 60px; 
            color: #6C63FF40;
        }
        .status { 
            margin: 10px 0; 
            padding: 10px; 
            border-radius: 4px;
            font-weight: bold;
        }
        .status.loading { background: #e3f2fd; color: #1976d2; }
        .status.success { background: #e8f5e9; color: #388e3c; }
        .status.error { background: #ffebee; color: #d32f2f; }
        .log { 
            background: #2d2d2d; 
            color: #00ff00; 
            padding: 15px; 
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.5;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        h2 { margin-top: 0; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Loading Test</h1>
        <p>Testing if SVG files from Laravel are loading correctly in browser</p>
        
        <div class="test-card">
            <h2>Test 1: Model 590 Preview</h2>
            <div class="status loading" id="status1">⏳ Loading...</div>
            <div class="img-wrapper">
                <img id="img590" src="http://127.0.0.1:8000/storage/models/590/preview.svg" alt="Model 590">
            </div>
        </div>
        
        <div class="test-card">
            <h2>Test 2: Model 1393 Preview</h2>
            <div class="status loading" id="status2">⏳ Loading...</div>
            <div class="img-wrapper">
                <img id="img1393" src="http://127.0.0.1:8000/storage/models/1393/preview.svg" alt="Model 1393">
            </div>
        </div>
        
        <div class="test-card">
            <h2>Console Logs</h2>
            <div class="log" id="logs"></div>
        </div>
    </div>
    
    <script>
        const logsDiv = document.getElementById('logs');
        
        function log(...args) {
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
            console.log(msg);
            logsDiv.textContent += msg + '\n';
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        log('[START] Page loaded, testing image loads...');
        log('[INFO] Host: ' + window.location.hostname);
        log('[INFO] Protocol: ' + window.location.protocol);
        
        function setupImage(imgId, statusId, description) {
            const img = document.getElementById(imgId);
            const status = document.getElementById(statusId);
            
            log(`\n[SETUP] ${description}`);
            log(`  - Image ID: ${imgId}`);
            log(`  - Source: ${img.src}`);
            log(`  - Current size: ${img.width}x${img.height}`);
            
            img.addEventListener('load', () => {
                log(`[✅ onLoad] ${description} - Size: ${img.naturalWidth}x${img.naturalHeight}`);
                status.textContent = '✅ Loaded successfully';
                status.className = 'status success';
            });
            
            img.addEventListener('error', (e) => {
                log(`[❌ onError] ${description}`);
                log(`  - Error event: ${e.type}`);
                log(`  - Current src: ${img.src}`);
                log(`  - Image crossOrigin: ${img.crossOrigin || 'not set'}`);
                status.textContent = '❌ Failed to load';
                status.className = 'status error';
            });
            
            // Manually trigger the load (sometimes needed)
            img.src = img.src;
        }
        
        setupImage('img590', 'status1', 'Model 590 (steel structure)');
        setupImage('img1393', 'status2', 'Model 1393 (Construction site)');
        
        log('\n[AWAITING] Waiting for images to load/fail...');
        log('[TIP] Check Network tab in Dev Tools to see actual HTTP requests');
        
        // Timeout checker
        setTimeout(() => {
            const img590 = document.getElementById('img590');
            const img1393 = document.getElementById('img1393');
            log(`\n[TIMEOUT Check - 5 seconds]`);
            log(`  - img590 complete: ${img590.complete}`);
            log(`  - img590 currentSrc: ${img590.currentSrc}`);
            log(`  - img1393 complete: ${img1393.complete}`);
            log(`  - img1393 currentSrc: ${img1393.currentSrc}`);
        }, 5000);
    </script>
</body>
</html>
